<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Depositar Dinero - Billetera Virtual</title>
  <!-- Bootstrap 4.5.0 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- Estilos Personalizados -->
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
  <div class="container">
    <a href="menu.html" class="back-link" id="backToMenuLink">
      <i class="bi bi-arrow-left"></i> Volver al Menú
    </a>
    
    <h1>Depositar Dinero</h1>

    <!-- Tarjeta de Saldo Actual -->
    <div class="balance-card">
      <h3>Saldo Disponible</h3>
      <div class="balance-amount">$<span id="balance">0.00</span></div>
    </div>

    <!-- Contenedor para Alertas de Éxito o Error de Bootstrap -->
    <div id="alert-container"></div>

    <!-- Formulario de Depósito -->
    <form id="depositForm" class="mt-3">
      <div class="form-group">
        <label for="amount">Monto a Depositar ($):</label>
        <input type="number" id="amount" class="form-control" placeholder="Ingrese el monto, ej. 1000" min="0.01" step="0.01" required>
      </div>
      <button type="submit" id="depositBtn" class="btn btn-success btn-block mt-4">
        <i class="bi bi-plus-circle"></i> Confirmar Depósito
      </button>
    </form>

    <!-- Leyenda debajo del formulario mostrando el monto depositado -->
    <div id="deposit-legend-container" class="mt-3"></div>
  </div>

  <!-- jQuery y dependencias de Bootstrap -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
  <!-- Lógica de la Billetera -->
  <script src="../JS/script.js"></script>
</body>
</html>
