<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar Sesión - Billetera Virtual</title>
  <!-- Bootstrap 4.5.0 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- Estilos Personalizados -->
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
  <div class="container">
    <div class="brand-logo">
      <i class="bi bi-wallet2"></i>
    </div>
    <h1>Iniciar Sesión</h1>
    
    <!-- Contenedor de Alertas Dinámicas de Bootstrap -->
    <div id="alert-container"></div>

    <form id="loginForm" class="mt-4">
      <div class="form-group">
        <label for="email">Correo Electrónico:</label>
        <input type="text" id="email" class="form-control" placeholder="ejemplo@correo.com" required>
      </div>
      <div class="form-group">
        <label for="password">Contraseña:</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
      </div>
      <button type="submit" class="btn btn-primary btn-block mt-4">
        Ingresar <i class="bi bi-box-arrow-in-right"></i>
      </button>
    </form>
  </div>

  <!-- jQuery y dependencias de Bootstrap -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
  <!-- Lógica de la Billetera -->
  <script src="../JS/script.js"></script>
</body>
</html>
