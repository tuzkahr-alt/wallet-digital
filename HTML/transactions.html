<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Últimos Movimientos - Billetera Virtual</title>
  <!-- Bootstrap 4.5.0 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- Estilos Personalizados -->
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
  <div class="container" style="max-width: 680px;">
    <a href="menu.html" class="back-link" id="backToMenuLink">
      <i class="bi bi-arrow-left"></i> Volver al Menú
    </a>
    
    <h1>Últimos Movimientos</h1>

    <!-- Contenedor del Filtro de Transacciones -->
    <div class="row align-items-center mb-4">
      <div class="col-md-7">
        <label for="filterType" class="mb-1 d-block text-muted">Filtrar por tipo de movimiento:</label>
        <select id="filterType" class="form-control">
          <option value="todas">Todos los movimientos</option>
          <option value="deposito">Depósitos</option>
          <option value="transferencia">Transferencias Enviadas</option>
          <option value="compra">Compras</option>
          <option value="recibido">Transferencias Recibidas</option>
        </select>
      </div>
      <div class="col-md-5 text-right mt-3 mt-md-0">
        <button id="clearHistoryBtn" class="btn btn-danger btn-sm">
          <i class="bi bi-trash3"></i> Limpiar Historial
        </button>
      </div>
    </div>

    <!-- Tabla de Movimientos -->
    <div class="table-responsive">
      <table class="table table-hover">
        <thead>
          <tr>
            <th>Fecha</th>
            <th>Detalle / Tipo</th>
            <th class="text-right">Monto</th>
          </tr>
        </thead>
        <tbody id="transactionListBody">
          <!-- Las filas se renderizan dinámicamente -->
        </tbody>
      </table>
    </div>

    <!-- Mensaje si no hay movimientos -->
    <div id="noTransactionsMessage" class="text-center text-muted py-4" style="display: none;">
      <i class="bi bi-info-circle display-4 mb-2 d-block"></i>
      No hay movimientos registrados para este tipo.
    </div>
  </div>

  <!-- jQuery y dependencias de Bootstrap -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
  <!-- Lógica de la Billetera -->
  <script src="../JS/script.js"></script>
</body>
</html>
