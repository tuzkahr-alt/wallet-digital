<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Principal - Billetera Virtual</title>
  <!-- Bootstrap 4.5.0 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- Estilos Personalizados -->
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
  <div class="container">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <span class="text-muted"><i class="bi bi-person-circle"></i> Hola, Admin</span>
      <a href="index.html" class="btn btn-secondary btn-sm" id="logoutBtn">
        <i class="bi bi-box-arrow-left"></i> Salir
      </a>
    </div>

    <h1>Mi Billetera</h1>

    <!-- Tarjeta de Saldo Actual -->
    <div class="balance-card">
      <h3>Saldo Disponible</h3>
      <div class="balance-amount">$<span id="balance">0.00</span></div>
    </div>

    <!-- Contenedor para Leyenda de Redirección -->
    <div id="redirect-legend-container"></div>

    <!-- Botones de Acción -->
    <div class="d-flex flex-column gap-3 mt-4">
      <button id="btnDeposit" class="btn btn-primary btn-block mb-3">
        <i class="bi bi-cash-coin"></i> Depositar
      </button>
      <button id="btnSendMoney" class="btn btn-primary btn-block mb-3">
        <i class="bi bi-send"></i> Enviar Dinero
      </button>
      <button id="btnTransactions" class="btn btn-primary btn-block">
        <i class="bi bi-arrow-left-right"></i> Últimos Movimientos
      </button>
    </div>
  </div>

  <!-- jQuery y dependencias de Bootstrap -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
  <!-- Lógica de la Billetera -->
  <script src="../JS/script.js"></script>
</body>
</html>
