<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Enviar Dinero - Billetera Virtual</title>
  <!-- Bootstrap 4.5.0 CSS -->
  <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/css/bootstrap.min.css">
  <!-- Bootstrap Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
  <!-- Estilos Personalizados -->
  <link rel="stylesheet" href="../CSS/styles.css">
</head>
<body>
  <div class="container">
    <a href="menu.html" class="back-link" id="backToMenuLink">
      <i class="bi bi-arrow-left"></i> Volver al Menú
    </a>
    
    <h1>Enviar Dinero</h1>

    <!-- Contenedor de Alertas -->
    <div id="alert-container"></div>

    <!-- Buscador de Agenda -->
    <div class="form-group mb-4">
      <label for="searchContact">Buscar contacto (Nombre o Alias/CBU):</label>
      <div class="input-group">
        <input type="text" id="searchContact" class="form-control" placeholder="Escriba para filtrar...">
        <div class="input-group-append">
          <button class="btn btn-secondary" id="clearSearchBtn" type="button">
            <i class="bi bi-x-circle"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Lista de Contactos (Agenda) -->
    <div class="mb-4">
      <div class="d-flex justify-content-between align-items-center mb-2">
        <h2 class="h5 mb-0">Contactos</h2>
        <button id="btnAddContact" class="btn btn-secondary btn-sm">
          <i class="bi bi-person-plus"></i> Nuevo Contacto
        </button>
      </div>
      
      <!-- Contenedor del Formulario para Agregar Contactos (inicialmente oculto) -->
      <div id="addContactFormContainer" class="p-3 mb-3 border rounded" style="display: none; background: rgba(255, 255, 255, 0.02); border-color: rgba(255, 255, 255, 0.08) !important;">
        <h3 class="h6 mb-3">Agregar Nuevo Contacto</h3>
        <form id="addContactForm">
          <div class="form-group">
            <label for="contactName">Nombre Completo:</label>
            <input type="text" id="contactName" class="form-control form-control-sm" placeholder="Juan Pérez">
          </div>
          <div class="form-group">
            <label for="contactCbu">CBU o Alias (CBU: 22 dígitos):</label>
            <input type="text" id="contactCbu" class="form-control form-control-sm" placeholder="Ej: 0170000000000000000000 o alias.nombre">
          </div>
          <div class="d-flex gap-2 justify-content-end">
            <button type="button" id="btnCancelAddContact" class="btn btn-secondary btn-sm mr-2">Cancelar</button>
            <button type="submit" class="btn btn-success btn-sm">Guardar</button>
          </div>
        </form>
      </div>

      <!-- Lista de Contactos Renderizada -->
      <ul id="contactList" class="list-group">
        <!-- Cargados dinámicamente -->
      </ul>
    </div>

    <!-- Sección de Enviar Dinero (Monto y Confirmación) -->
    <div id="sendMoneyFormContainer" style="display: none;" class="p-3 border rounded mb-3">
      <h3 class="h6 mb-3 text-white">Detalles del Envío</h3>
      <div class="form-group">
        <label for="sendAmount">Monto a Enviar ($):</label>
        <input type="number" id="sendAmount" class="form-control" placeholder="Ingrese el monto a enviar" min="0.01" step="0.01">
      </div>
      <button id="btnSendMoneyAction" class="btn btn-success btn-block">
        <i class="bi bi-send-check"></i> Confirmar Envío de Dinero
      </button>
    </div>

    <!-- Alerta de Confirmación de Envío Exitoso en la parte inferior -->
    <div id="confirmation-container" class="mt-3"></div>
  </div>

  <!-- jQuery y dependencias de Bootstrap -->
  <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.0/dist/umd/popper.min.js"></script>
  <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.0/js/bootstrap.min.js"></script>
  <!-- Lógica de la Billetera -->
  <script src="../JS/script.js"></script>
</body>
</html>
